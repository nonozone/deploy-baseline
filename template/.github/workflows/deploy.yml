name: Optional GHCR Image Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive Image Name
        id: image
        env:
          IMAGE_REPOSITORY: ${{ github.repository }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          image_repo="$(printf '%s' "$IMAGE_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_tag="sha-${IMAGE_SHA}"
          image_ref="ghcr.io/${image_repo}:${image_tag}"
          echo "ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Log In to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}

      - name: Check Deployment Readiness
        id: deploy_ready
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          APP_PROD_ENV: ${{ secrets.APP_PROD_ENV }}
        run: |
          missing=()
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH SSH_PRIVATE_KEY APP_PROD_ENV; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning ::Missing required deployment secrets: ${missing[*]}. Skipping auto-deploy. Configure repository secrets to enable this workflow."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.deploy_ready.outputs.ready == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload Project Files
        if: steps.deploy_ready.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          ssh -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=deploy/env/app.prod.env \
            -czf - . \
            | ssh -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$DEPLOY_PATH'"

      - name: Write Production Env File
        if: steps.deploy_ready.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          APP_PROD_ENV: ${{ secrets.APP_PROD_ENV }}
        run: |
          printf '%s' "$APP_PROD_ENV" \
            | ssh -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/deploy/env/app.prod.env'"

      - name: Run Deploy
        if: steps.deploy_ready.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          ssh -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "
            cd '$DEPLOY_PATH' &&
            make deploy-check &&
            DEPLOY_MODE=image DEPLOY_IMAGE='$DEPLOY_IMAGE' make deploy &&
            make prod-health
          "
