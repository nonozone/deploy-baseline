name: ${COMPOSE_PROJECT_NAME:-sampleapp}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ${APP_IMAGE:-sampleapp:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./deploy/env/app.prod.env
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PUBLISH_IP:-127.0.0.1}:${APP_PUBLISH_PORT:-8000}:8000"
    command:
      - sh
      - -c
      - echo 请替换为项目实际生产启动命令 && sleep infinity

volumes:
  pgdata_prod:
