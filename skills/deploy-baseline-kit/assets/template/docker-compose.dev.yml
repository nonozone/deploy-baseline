services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - ./:/workspace
    command:
      - sh
      - -c
      - echo 请替换为项目实际开发启动命令 && sleep infinity
